<div
  class="group flex gap-1 rounded-l bg-gray-800 p-1 data-[orientation=horizontal]:w-full data-[orientation=horizontal]:flex-col data-[orientation=vertical]:h-full"
  [attr.data-orientation]="orientation()"
>
  @let _entity = entity();
  @if (_entity.health) {
    <ah-single-bar
      class="rounded-md group-data-[orientation=horizontal]:h-2 group-data-[orientation=vertical]:w-2"
      badColor="bg-health-damaged"
      goodColor="bg-health"
      [max]="_entity.health.max"
      [current]="_entity.health.damaged"
      [orientation]="orientation()"
    />
  }
  @if (_entity.sanity) {
    <ah-single-bar
      class="rounded-md group-data-[orientation=horizontal]:h-2 group-data-[orientation=vertical]:w-2"
      badColor="bg-sanity-damaged"
      goodColor="bg-sanity"
      [max]="_entity.sanity.max"
      [current]="_entity.sanity.damaged"
      [orientation]="orientation()"
    />
  }
</div>
